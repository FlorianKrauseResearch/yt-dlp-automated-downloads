# yt-dlp-queue configuration
# Edit these paths to match your setup.
# This file is sourced by yt-dlp-queue.sh on every run.
# PROJECT_DIR is set automatically before this file is sourced.

# Where you paste URLs to download (one per line)
QUEUE_FILE="$PROJECT_DIR/downloads.queue"

# Channels/playlists to check every run (never cleared)
SUBSCRIPTIONS_FILE="$PROJECT_DIR/subscriptions.txt"

# Where downloaded videos (and their metadata) are saved
DOWNLOAD_DIR="$HOME/Videos"

# Tracks already-downloaded videos to avoid duplicates
ARCHIVE_FILE="$PROJECT_DIR/data/.yt-dlp-archive"

# Log file location
LOG_FILE="$PROJECT_DIR/data/yt-dlp-queue.log"

# Browser to pull cookies from when auth is needed (firefox, chrome, chromium, etc.)
COOKIE_BROWSER="firefox"
